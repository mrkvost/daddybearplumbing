server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Serve files directly; fall back to index.html for Angular client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed assets (JS/CSS bundles) aggressively — Angular adds a hash to filenames.
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|webp|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
