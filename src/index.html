<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>DADDY BEAR PLUMBING | Precision Engineering</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />

    <!-- Open Graph defaults — crawlers (Facebook, LinkedIn, X) do NOT execute JS,
         so these absolute values must be baked into the static HTML.
         CanonicalService still updates them per-route for the in-browser experience. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Daddy Bear Plumbing" />
    <meta property="og:title" content="Daddy Bear Plumbing" />
    <meta property="og:description" content="Professional plumbing services for Chicago's Western Suburbs. Licensed, insured, and locally owned." />
    <meta property="og:url" content="https://kvaking.com" />
    <meta property="og:image" content="https://kvaking.com/og-placeholder.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Daddy Bear Plumbing logo" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Daddy Bear Plumbing" />
    <meta name="twitter:description" content="Professional plumbing services for Chicago's Western Suburbs. Licensed, insured, and locally owned." />
    <meta name="twitter:image" content="https://kvaking.com/og-placeholder.jpg" />

    <!-- Fonts: Public Sans + Inter self-hosted (see src/fonts.css)
         Public Sans (latin) is the headline font that drives initial paint.
         Preload it + use font-display: optional so the fallback never swaps,
         eliminating CLS on the brand title and call button. -->
    <link rel="preload" as="font" type="font/woff2" href="/fonts/public-sans-latin.woff2" crossorigin />
    <!-- Material Symbols Outlined: loaded from Google Fonts (icon set too large to self-host) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
