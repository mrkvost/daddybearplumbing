<header class="fixed top-0 w-full z-50 bg-surface-container-lowest border-b border-outline-variant/20">
  <div class="flex flex-row justify-between items-center px-4 py-3 w-full max-w-7xl mx-auto gap-4">
    <div class="flex items-center gap-2">
      <button
        (click)="toggleMenu()"
        class="p-2 hover:bg-surface-container-high transition-colors shrink-0"
      >
        <span class="material-symbols-outlined text-primary">menu</span>
      </button>
      <a routerLink="/" class="font-headline tracking-tighter uppercase font-bold text-lg text-primary leading-tight">
        DADDY BEAR PLUMBING
      </a>
    </div>

    <a
      href="tel:7085552222"
      class="bg-primary-fixed text-white px-4 py-3 font-headline font-bold text-xs tracking-tight flex items-center justify-center gap-2 hover:opacity-90 transition-all shrink-0 min-w-[140px]"
    >
      <span class="material-symbols-outlined text-sm shrink-0" style="font-variation-settings: 'FILL' 1;">call</span>
      <span class="text-center leading-tight">CALL (708) 555-2222</span>
    </a>
  </div>

  <div
    [class.hidden]="!isMenuOpen"
    class="absolute top-full left-0 w-full bg-surface-container-lowest border-b border-outline-variant/20"
  >
    <nav class="flex flex-col max-w-7xl mx-auto px-6 py-4 gap-1">
      <a routerLink="/" (click)="closeMenu()" class="font-headline font-bold text-sm uppercase tracking-widest py-3 px-2 hover:bg-surface-container-low transition-colors">Home</a>
      <a routerLink="/gallery" (click)="closeMenu()" class="font-headline font-bold text-sm uppercase tracking-widest py-3 px-2 hover:bg-surface-container-low transition-colors">Gallery</a>
      <a routerLink="/reviews" (click)="closeMenu()" class="font-headline font-bold text-sm uppercase tracking-widest py-3 px-2 hover:bg-surface-container-low transition-colors">Reviews</a>
    </nav>
  </div>
</header>
