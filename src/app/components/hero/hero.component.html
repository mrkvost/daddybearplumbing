<section class="relative h-[600px] flex items-center overflow-hidden bg-black">
  <div class="absolute inset-0 z-0">
    @if (heroImage) {
      <img
        alt="Professional plumber at work"
        class="w-full h-full object-cover grayscale-filter opacity-60"
        [src]="heroImage"
      />
    }
  </div>
  <div class="relative z-10 w-full max-w-7xl mx-auto px-6">
    <div class="max-w-3xl">
      <h1 class="font-headline font-black text-5xl md:text-8xl text-white leading-[0.9] tracking-tighter uppercase mb-8">
        Honest Plumbing for La Grange &amp; Villa Park
      </h1>
      <p class="text-white/80 text-lg max-w-xl font-light leading-relaxed mb-12">
        Precision engineering meets old-school integrity. We resolve complex mechanical failures
        with surgical accuracy and transparent pricing.
      </p>
      <div class="flex flex-col md:flex-row gap-6">
        <div class="flex items-center gap-4 border-l border-white/20 pl-6">
          <div class="text-white">
            <p class="text-[0.65rem] uppercase tracking-widest text-white/50 mb-1">Status</p>
            <p class="font-bold text-sm uppercase">On-Call During Working Hours</p>
          </div>
        </div>
        <div class="flex items-center gap-4 border-l border-white/20 pl-6">
          <div class="text-white">
            <p class="text-[0.65rem] uppercase tracking-widest text-white/50 mb-1">Area</p>
            <p class="font-bold text-sm">CHICAGO WEST SUBURBS</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
