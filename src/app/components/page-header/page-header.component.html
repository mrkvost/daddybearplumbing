<section class="relative flex items-end overflow-hidden bg-black"
  [style.height]="compact ? '300px' : '600px'">
  @if (imageUrl) {
    <div class="absolute inset-0 z-0">
      <img [src]="imageUrl" alt="" class="w-full h-full object-cover opacity-60" />
    </div>
  }
  <div class="relative z-10 w-full max-w-7xl mx-auto px-6 pb-12">
    @if (eyebrow) {
      <p class="text-white/50 text-[0.7rem] font-bold tracking-[0.3em] uppercase mb-4">{{ eyebrow }}</p>
    }
    <h1 class="font-headline font-black text-white leading-[0.9] tracking-tighter uppercase"
      [ngClass]="compact ? 'text-5xl md:text-7xl' : 'text-6xl md:text-8xl'">
      {{ title }}
    </h1>
  </div>
</section>
