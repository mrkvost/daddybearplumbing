<!-- ServicesGridComponent: card grid of offered services -->

<section class="max-w-7xl mx-auto px-4 py-12">

  <div class="flex items-end justify-between mb-8">
    <div>
      <h2 class="text-primary dark:text-white text-2xl font-black leading-tight">Our Services</h2>
      <p class="text-slate-500 font-medium">Expert solutions for every plumbing need.</p>
    </div>
  </div>

  <!--
    @for is Angular's template loop syntax (introduced in Angular 17).
    It iterates over the services array defined in the TypeScript class.
    "track service.title" tells Angular how to identify each item for
    efficient DOM updates when the list changes.
  -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
    @for (service of services; track service.title) {
      <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl border border-slate-200 dark:border-slate-800 flex flex-col items-center text-center group hover:border-accent transition-all cursor-pointer">

        <!--
          [class] binding: the icon wrapper changes colors on hover.
          Angular evaluates the expression and updates the class list reactively.
        -->
        <div class="bg-primary/10 text-primary p-4 rounded-xl mb-4 group-hover:bg-accent group-hover:text-white transition-colors">
          <!--
            {{ service.icon }} is Angular's interpolation syntax —
            it inserts the value of the expression as text into the DOM.
          -->
          <span class="material-symbols-outlined text-3xl">{{ service.icon }}</span>
        </div>

        <h3 class="font-bold text-slate-900 dark:text-white mb-1">{{ service.title }}</h3>
        <p class="text-xs text-slate-500">{{ service.subtitle }}</p>

      </div>
    }
  </div>

</section>
