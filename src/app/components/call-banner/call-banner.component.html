<!-- Shared "navy band with orange call CTA" used at the bottom of most public pages.
     The `experience` variant gets a split-color title and a pulsing icon disc;
     all others share the standard layout. -->
<div class="max-w-7xl mx-auto px-4 md:px-6 pb-12 md:pb-16">
  <section class="relative bg-navy rounded-2xl overflow-hidden px-6 md:px-12 py-12">
    <div class="flex flex-col md:flex-row items-center justify-between gap-8 relative z-10">
      <div class="flex flex-col md:flex-row items-center gap-6 text-center md:text-left">
        <!-- Icon disc. Pulses on the `experience` variant to match the contact + reviews design. -->
        <div class="relative">
          <div class="absolute inset-0 bg-black/20 rounded-full scale-110 blur-sm"></div>
          <div class="relative w-16 h-16 bg-primary-orange rounded-full flex items-center justify-center shadow-xl"
            [class.animate-pulse]="variant === 'experience'">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" fill="currentColor"
              class="w-8 h-8 text-white" aria-hidden="true">
              <path d="M798-120q-125 0-247-54.5T329-329Q229-429 174.5-551T120-798q0-18 12-30t30-12h162q14 0 25 9.5t13 22.5l26 140q2 16-1 27t-11 19l-97 98q20 37 47.5 71.5T387-386q31 31 65 57.5t72 48.5l94-94q9-9 23.5-13.5T670-390l138 28q14 4 23 14.5t9 23.5v162q0 18-12 30t-30 12Z"/>
            </svg>
          </div>
        </div>
        <div class="space-y-1">
          <h2 class="text-white font-headline text-3xl md:text-4xl font-bold uppercase tracking-tight leading-tight">
            {{ copy.title }}
            @if (copy.titleAccent) {
              <br>
              <span class="text-primary-orange">{{ copy.titleAccent }}</span>
            }
          </h2>
          <p class="text-white/90 font-body text-lg">{{ copy.subtitle }}</p>
        </div>
      </div>
      <div class="relative group">
        <div class="absolute inset-0 bg-primary-orange/30 blur-xl rounded-2xl group-hover:bg-primary-orange/50 transition-all"></div>
        <a [href]="'tel:' + phone"
          class="relative inline-flex items-center justify-center bg-primary-orange text-white px-8 md:px-10 py-5 rounded-2xl font-bold text-xl md:text-2xl shadow-2xl hover:scale-105 transition-transform whitespace-nowrap">
          {{ copy.buttonPrefix }} {{ phoneDisplay }}
        </a>
      </div>
    </div>
  </section>
</div>
