<!-- Hours grid: 3 cards on desktop, stacks on mobile. -->
<section class="py-20 bg-surface relative overflow-hidden">
  <div class="max-w-7xl mx-auto px-4 md:px-6 relative z-10">
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 lg:gap-8 items-stretch">
      <!-- Operation Hours -->
      <div class="bg-white p-6 md:p-8 lg:p-10 rounded-[20px] shadow-sm border border-outline-variant/30 flex items-center gap-4 md:gap-6 h-full transition-all hover:shadow-md">
        <div class="w-16 h-16 rounded-full bg-background-light-blue flex items-center justify-center text-primary-blue shrink-0 border border-primary-blue/10">
          <span class="material-symbols-outlined text-3xl">schedule</span>
        </div>
        <div>
          <h3 class="font-headline font-black text-navy text-xl uppercase tracking-tight">Operation Hours</h3>
          <div class="w-10 h-1 bg-primary-blue mt-1 mb-3 rounded-full opacity-80"></div>
          <p class="text-xs text-navy/70 font-black uppercase tracking-wider mb-1">Monday – Friday</p>
          <p class="font-black text-navy text-lg leading-none">8:00 AM – 5:00 PM</p>
          <p class="text-xs text-navy/70 font-bold mt-2">Emergency service available 24/7</p>
        </div>
      </div>

      <!-- Office Hours -->
      <div class="bg-white p-6 md:p-8 lg:p-10 rounded-[20px] shadow-sm border border-outline-variant/30 flex items-center gap-4 md:gap-6 h-full transition-all hover:shadow-md">
        <div class="w-16 h-16 rounded-full bg-background-light-blue flex items-center justify-center text-primary-blue shrink-0 border border-primary-blue/10">
          <span class="material-symbols-outlined text-3xl">schedule</span>
        </div>
        <div>
          <h3 class="font-headline font-black text-navy text-xl uppercase tracking-tight">Office Hours</h3>
          <div class="w-10 h-1 bg-primary-blue mt-1 mb-3 rounded-full opacity-80"></div>
          <p class="text-xs text-navy/70 font-black uppercase tracking-wider mb-1">Monday – Friday</p>
          <p class="font-black text-navy text-lg leading-none">8:00 AM – 5:00 PM</p>
          <p class="text-xs text-navy/70 font-bold mt-2">Emergency service available 24/7</p>
        </div>
      </div>

      <!-- 24/7 Emergency (prominent) -->
      <div class="bg-white p-6 md:p-8 lg:p-10 rounded-[20px] shadow-sm border border-primary-orange/20 flex items-center gap-4 md:gap-6 h-full transition-all hover:shadow-md relative overflow-hidden group md:col-span-2 lg:col-span-1">
        <div class="absolute inset-0 bg-gradient-to-br from-primary-orange/[0.03] to-transparent pointer-events-none"></div>
        <div class="w-16 h-16 rounded-full bg-primary-orange flex items-center justify-center text-white shrink-0 shadow-lg shadow-primary-orange/20 relative z-10">
          <span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">emergency</span>
        </div>
        <div class="relative z-10">
          <h3 class="font-headline font-black text-navy text-xl uppercase tracking-tight">24/7 Emergency</h3>
          <div class="w-10 h-1 bg-primary-orange mt-1 mb-3 rounded-full"></div>
          <p class="text-xs text-primary-orange font-black uppercase tracking-wider mb-1">We're Always Here</p>
          <p class="font-medium text-navy/70 text-sm leading-snug">Reliable service around the clock for any plumbing crisis.</p>
        </div>
      </div>
    </div>
  </div>
</section>
