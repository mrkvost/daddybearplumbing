<section class="py-24 px-6 bg-surface-container-low">
  <div class="max-w-7xl mx-auto">
    <div class="mb-12">
      <p class="text-secondary text-[0.7rem] font-bold tracking-[0.3em] uppercase mb-4">Service Radius</p>
      <h2 class="font-headline font-black text-4xl tracking-tighter uppercase">Serving La Grange &amp; Villa Park</h2>
    </div>

    <div class="grid md:grid-cols-2 gap-12">
      <!-- Left: location list -->
      <div>
        <p class="text-secondary text-sm leading-relaxed mb-8">
          Serving Cook and DuPage Counties with specialized field units deployed daily
          across La Grange, Villa Park, and the surrounding Western Suburbs.
        </p>
        <div class="space-y-4">
          @for (loc of locations; track loc) {
            <div class="flex items-center gap-3 border-b border-outline-variant/10 pb-3">
              <span class="material-symbols-outlined text-sm text-secondary">location_on</span>
              <span class="font-headline font-bold text-sm uppercase tracking-widest">{{ loc }}</span>
            </div>
          }
        </div>
      </div>

      <!-- Right: embedded Google Map -->
      <div class="w-full aspect-square ghost-border overflow-hidden">
        <iframe
          [src]="safeEmbedUrl"
          width="100%"
          height="100%"
          style="border: 0;"
          allowfullscreen
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
          title="Daddy Bear Plumbing service area map"
          class=""
        ></iframe>
      </div>
    </div>
  </div>
</section>
