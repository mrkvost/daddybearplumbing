<main class="wave-bg">
  <!-- Page title — small "Our History"-style with orange rail. -->
  <section class="pt-16 md:pt-20 pb-8 md:pb-12 px-4 md:px-6 max-w-7xl mx-auto text-center">
    <h1 class="font-headline text-3xl md:text-5xl text-navy uppercase font-bold leading-tight inline-block relative">
      FAQ
      <span class="absolute -bottom-4 left-1/2 -translate-x-1/2 w-24 h-1.5 bg-primary-orange rounded-full"></span>
    </h1>
  </section>

  <!-- FAQ list — numbered cards. Orange "N." prefix on every question. -->
  <section class="pb-16 md:pb-24 px-4 md:px-6">
    <div class="max-w-4xl mx-auto flex flex-col gap-6">
      @for (item of items; track $index) {
        <article class="bg-white p-6 md:p-8 rounded-xl border border-outline-variant/40 shadow-sm shadow-navy/5 hover:shadow-md transition-all">
          <h2 class="font-headline font-bold text-xl md:text-2xl text-navy mb-3 uppercase">
            <span class="text-primary-orange">{{ $index + 1 }}.</span> {{ item.question }}
          </h2>
          <div class="font-body text-base text-on-surface-variant leading-relaxed">
            <p [class.mb-4]="item.bullets?.length">{{ item.answer }}</p>
            @if (item.bullets?.length) {
              <ul class="space-y-2">
                @for (bullet of item.bullets; track $index) {
                  <li class="flex items-start gap-3">
                    <span class="material-symbols-outlined text-primary-orange text-lg shrink-0 mt-0.5"
                      style="font-variation-settings: 'FILL' 1;">check_circle</span>
                    <span>{{ bullet }}</span>
                  </li>
                }
              </ul>
            }
          </div>
        </article>
      }
    </div>
  </section>

  <app-call-banner variant="questions" />
</main>
