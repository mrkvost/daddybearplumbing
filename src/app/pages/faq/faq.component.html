<app-page-header eyebrow="Common Questions" title="FAQ" />

<section class="max-w-4xl mx-auto px-6 py-16">

  <div class="space-y-6">

    @for (item of items; track $index) {
      <div class="ghost-border bg-surface-container-low p-6">
        <h2 class="font-headline font-bold text-sm uppercase tracking-tight mb-3">{{ item.question }}</h2>
        <div class="text-secondary text-sm leading-relaxed">
          <p [class.mb-3]="item.bullets?.length">{{ item.answer }}</p>
          @if (item.bullets?.length) {
            <ul class="space-y-1.5 ml-4">
              @for (bullet of item.bullets; track $index) {
                <li class="flex items-center gap-2">
                  <span class="material-symbols-outlined text-xs text-primary-fixed">check</span>
                  {{ bullet }}
                </li>
              }
            </ul>
          }
        </div>
      </div>
    }

  </div>

</section>
