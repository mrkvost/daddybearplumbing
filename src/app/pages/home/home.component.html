<!--
  HomeComponent template — assembles section components into the home page.
  Each custom tag here maps to a component's selector defined in its .ts file.
  Navbar and Footer are NOT here — they live in AppComponent and render automatically.
-->
<app-hero />
<app-trust-stats />
<app-services-grid />
<app-service-area />

<!-- Section transition: blue wave with orange accent stroke -->
<div class="bg-white h-24 relative overflow-hidden">
  <svg class="absolute inset-0 w-full h-full" preserveAspectRatio="none" viewBox="0 0 1440 100" aria-hidden="true">
    <path d="M0,100 C400,0 1000,100 1440,0 L1440,100 L0,100 Z" fill="#1E6FEA" opacity="0.9"/>
    <path d="M0,100 C400,20 1000,80 1440,20" fill="none" opacity="0.8" stroke="#FF5A1F" stroke-width="8"/>
  </svg>
</div>

<!-- Bottom call banner -->
<section class="bg-navy text-white py-16 relative overflow-hidden">
  <div class="max-w-7xl mx-auto px-4 md:px-6 flex flex-col md:flex-row items-center justify-between gap-10 relative z-10">
    <div class="flex items-center gap-6 text-center md:text-left flex-col md:flex-row">
      <div class="w-24 h-24 bg-primary-orange text-white rounded-full flex items-center justify-center shrink-0 shadow-2xl ring-8 ring-white/10">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" fill="currentColor"
          class="w-12 h-12" aria-hidden="true">
          <path d="M798-120q-125 0-247-54.5T329-329Q229-429 174.5-551T120-798q0-18 12-30t30-12h162q14 0 25 9.5t13 22.5l26 140q2 16-1 27t-11 19l-97 98q20 37 47.5 71.5T387-386q31 31 65 57.5t72 48.5l94-94q9-9 23.5-13.5T670-390l138 28q14 4 23 14.5t9 23.5v162q0 18-12 30t-30 12Z"/>
        </svg>
      </div>
      <div>
        <h2 class="font-headline text-3xl md:text-5xl font-black tracking-tight leading-none mb-3 uppercase">Need Plumbing Help?</h2>
        <p class="text-white text-lg md:text-xl font-medium">Fast, reliable, and honest service — call us today.</p>
      </div>
    </div>
    <a [href]="'tel:' + phone"
      class="bg-primary-orange text-white px-8 md:px-12 py-5 md:py-6 rounded-2xl font-black text-2xl md:text-3xl shadow-[0_15px_40px_rgba(255,90,31,0.5)] hover:scale-105 transition-transform border-4 border-white/20 inline-flex items-center justify-center whitespace-nowrap">
      {{ phoneDisplay }}
    </a>
  </div>
</section>
