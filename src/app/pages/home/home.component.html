<!--
  HomeComponent template — assembles section components into the home page.
  Each custom tag here maps to a component's selector defined in its .ts file.
  Navbar and Footer are NOT here — they live in AppComponent and render automatically.
-->
<app-hero />
<app-trust-stats />
<app-services-grid />
<app-service-area />

<!-- Section transition: blue wave with orange accent stroke -->
<div class="bg-white h-24 relative overflow-hidden">
  <svg class="absolute inset-0 w-full h-full" preserveAspectRatio="none" viewBox="0 0 1440 100" aria-hidden="true">
    <path d="M0,100 C400,0 1000,100 1440,0 L1440,100 L0,100 Z" fill="#1E6FEA" opacity="0.9"/>
    <path d="M0,100 C400,20 1000,80 1440,20" fill="none" opacity="0.8" stroke="#FF5A1F" stroke-width="8"/>
  </svg>
</div>

<app-call-banner variant="help" />
