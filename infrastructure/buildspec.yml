version: 0.2

# CodeBuild spec for admin-triggered rebuilds.
# Runs the same steps as docker_build.sh (without the docker wrapper)
# plus a sync to the site S3 bucket and a CloudFront invalidation.
#
# Required environment variables (set on the CodeBuild project):
#   BUCKET_NAME          - target S3 bucket for the built site (e.g. "kvaking")
#   CLOUDFRONT_DIST_ID   - distribution to invalidate after publish
#   GALLERY_BUCKET       - bucket holding gallery-images/* (for orphan cleanup)
#   TARGET_ENV           - which deployment env this build is for (kvaking,
#                          daddybear, …). Selects the right globals.<env>.ts
#                          in generate-seo.js and the right Angular build
#                          configuration for env-specific fileReplacements.

phases:
  install:
    runtime-versions:
      nodejs: 24

  pre_build:
    commands:
      - node --version
      - npm --version
      - node scripts/generate-seo.js

  build:
    commands:
      - npm install
      # Compose --configuration: always production; append the env name if it
      # matches a build configuration in angular.json (kvaking uses the plain
      # `production` default; daddybear adds `,daddybear` for fileReplacements).
      - |
        if [ -n "$TARGET_ENV" ] && [ "$TARGET_ENV" != "kvaking" ]; then
          NG_CONFIG="production,$TARGET_ENV"
        else
          NG_CONFIG="production"
        fi
      - echo "ng build --configuration=$NG_CONFIG"
      - npx ng build --configuration=$NG_CONFIG

  post_build:
    commands:
      # Layered upload + CloudFront invalidation. Shared with the local deploy.sh.
      - bash scripts/publish.sh
      # Prune meta.json orphans (previously-referenced hero/OG hashes). Safe
      # to run here because publish.sh has already deployed the bundle that
      # references the new hashes.
      - bash scripts/cleanup-meta-orphans.sh

artifacts:
  files:
    - 'dist/daddy-bear-plumbing/browser/**/*'
  discard-paths: no
  base-directory: .
